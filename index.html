<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeiterfassung — Ingenieurbüro Mirko Molt</title>
  <style>
    :root {
      --rot:     #c0272d;
      --rot-dark:#a01f24;
      --grau:    #f4f4f4;
      --dunkel:  #1a1a1a;
      --mittel:  #555555;
      --hell:    #ffffff;
      --linie:   #e8e8e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--grau);
      color: var(--dunkel);
      min-height: 100vh;
      padding: 0 0 40px;
    }

    /* ── Header ── */
    header {
      background: var(--hell);
      border-bottom: 3px solid var(--rot);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .logo-text {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--dunkel);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .logo-text span {
      color: var(--rot);
    }

    .logo-label {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--mittel);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      display: block;
      margin-bottom: 2px;
    }

    .header-divider {
      width: 1px;
      height: 36px;
      background: var(--linie);
      margin: 0 4px;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--dunkel);
    }

    .header-sub {
      font-size: 0.8rem;
      color: var(--mittel);
      margin-top: 2px;
    }

    /* ── Date bar ── */
    .date-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 0 16px;
    }

    .date-bar label {
      font-weight: 600;
      color: var(--dunkel);
      font-size: 0.9rem;
    }

    .date-bar input[type="date"] {
      padding: 8px 14px;
      border: 1.5px solid var(--linie);
      border-radius: 4px;
      font-size: 0.9rem;
      background: var(--hell);
      cursor: pointer;
      color: var(--dunkel);
      font-family: inherit;
    }

    .date-bar input[type="date"]:focus {
      outline: none;
      border-color: var(--rot);
    }

    /* ── Table ── */
    table {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      border-collapse: collapse;
      background: var(--hell);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    thead tr {
      background: var(--rot);
      color: var(--hell);
    }

    thead th {
      padding: 13px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    tbody tr {
      border-bottom: 1px solid var(--linie);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fdf5f5; }

    td {
      padding: 11px 16px;
      vertical-align: middle;
    }

    .name {
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--dunkel);
    }

    /* ── Buttons ── */
    .btn-group { display: flex; gap: 8px; }

    button {
      padding: 6px 14px;
      border: none;
      border-radius: 3px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: default; }

    .btn-in  { background: #2e7d32; color: #fff; }
    .btn-out { background: var(--rot); color: #fff; }
    .btn-in:hover:not(:disabled)  { background: #256427; }
    .btn-out:hover:not(:disabled) { background: var(--rot-dark); }

    /* ── Cells ── */
    .time-cell {
      font-size: 0.88rem;
      color: var(--mittel);
      min-width: 80px;
    }

    .duration {
      font-weight: 700;
      color: var(--dunkel);
      min-width: 70px;
      font-size: 0.9rem;
    }

    /* ── Status badges ── */
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 2px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-present { background: #e8f5e9; color: #2e7d32; }
    .status-absent  { background: #f4f4f4; color: #999; }
    .status-done    { background: #fce8e8; color: var(--rot); }

    /* ── Summary cards ── */
    .summary {
      max-width: 960px;
      margin: 20px auto 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 0;
    }

    .summary-card {
      background: var(--hell);
      border-radius: 4px;
      border-top: 3px solid var(--rot);
      padding: 16px 20px;
      flex: 1;
      min-width: 160px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }

    .summary-card .val {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--rot);
    }

    .summary-card .lbl {
      font-size: 0.78rem;
      color: var(--mittel);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Export ── */
    .export-bar {
      max-width: 960px;
      margin: 16px auto 0;
      text-align: right;
    }

    .btn-export {
      background: var(--rot);
      color: var(--hell);
      padding: 9px 22px;
      border-radius: 3px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .btn-export:hover { background: var(--rot-dark); }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 36px;
      font-size: 0.75rem;
      color: #bbb;
    }

    footer span { color: var(--rot); }
  </style>
</head>
<body>

<header>
  <div>
    <span class="logo-label">Ingenieurbüro</span>
    <div class="logo-text">mirko<span>|</span>molt<span>.</span></div>
  </div>
  <div class="header-divider"></div>
  <div>
    <div class="header-title">Zeiterfassung</div>
    <div class="header-sub">Ihre Planung — bei uns in guten Händen</div>
  </div>
</header>

<div class="date-bar">
  <label for="datePicker">Datum:</label>
  <input type="date" id="datePicker">
</div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Mitarbeiter</th>
      <th>Status</th>
      <th>Kommen</th>
      <th>Gehen</th>
      <th>Arbeitszeit</th>
      <th>Aktion</th>
    </tr>
  </thead>
  <tbody id="employeeTable"></tbody>
</table>

<div class="summary">
  <div class="summary-card">
    <div class="val" id="sumPresent">0</div>
    <div class="lbl">Anwesend</div>
  </div>
  <div class="summary-card">
    <div class="val" id="sumDone">0</div>
    <div class="lbl">Abgemeldet</div>
  </div>
  <div class="summary-card">
    <div class="val" id="sumAbsent">0</div>
    <div class="lbl">Abwesend</div>
  </div>
  <div class="summary-card">
    <div class="val" id="sumTotal">0:00</div>
    <div class="lbl">Gesamtstunden heute</div>
  </div>
</div>

<div class="export-bar">
  <button class="btn-export" onclick="exportCSV()">Export CSV</button>
</div>

<footer>
  &copy; Ingenieurbüro Mirko Molt &nbsp;·&nbsp; Kompetent, menschlich, zuverlässig &nbsp;·&nbsp; <span>ibmolt.de</span>
</footer>

<script>
  const NAMES = [
    "Anna Becker", "Thomas Müller", "Sandra Koch",
    "Jonas Weber", "Maria Schmidt", "Lukas Fischer",
    "Sabine Hartmann", "Michael Braun", "Laura Schneider", "Stefan Richter",
    "Petra Vogel", "Christian Wolf", "Nina Lange", "Markus Zimmermann", "Claudia Neumann"
  ];

  const picker = document.getElementById("datePicker");
  const today = new Date().toISOString().split("T")[0];
  picker.value = today;

  function storageKey(date) { return "zeiterfassung_" + date; }

  function loadData(date) {
    const raw = localStorage.getItem(storageKey(date));
    if (raw) return JSON.parse(raw);
    return NAMES.map(name => ({ name, checkIn: null, checkOut: null }));
  }

  function saveData(date, data) {
    localStorage.setItem(storageKey(date), JSON.stringify(data));
  }

  function nowTime() {
    return new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
  }

  function calcDuration(inTime, outTime) {
    if (!inTime || !outTime) return null;
    const [ih, im] = inTime.split(":").map(Number);
    const [oh, om] = outTime.split(":").map(Number);
    const mins = (oh * 60 + om) - (ih * 60 + im);
    if (mins <= 0) return null;
    return Math.floor(mins / 60) + ":" + String(mins % 60).padStart(2, "0");
  }

  function render() {
    const date = picker.value;
    const data = loadData(date);
    const tbody = document.getElementById("employeeTable");
    tbody.innerHTML = "";

    let present = 0, done = 0, absent = 0, totalMins = 0;

    data.forEach((emp, i) => {
      const duration = calcDuration(emp.checkIn, emp.checkOut);

      let statusLabel, statusClass;
      if (emp.checkIn && !emp.checkOut) {
        statusLabel = "Anwesend"; statusClass = "status-present"; present++;
      } else if (emp.checkIn && emp.checkOut) {
        statusLabel = "Abgemeldet"; statusClass = "status-done"; done++;
        if (duration) {
          const [h, m] = duration.split(":").map(Number);
          totalMins += h * 60 + m;
        }
      } else {
        statusLabel = "Abwesend"; statusClass = "status-absent"; absent++;
      }

      const inDisabled  = emp.checkIn  ? "disabled" : "";
      const outDisabled = (!emp.checkIn || emp.checkOut) ? "disabled" : "";

      tbody.innerHTML += `
        <tr>
          <td style="color:#aaa;font-size:0.85rem">${i + 1}</td>
          <td class="name">${emp.name}</td>
          <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
          <td class="time-cell">${emp.checkIn  || "—"}</td>
          <td class="time-cell">${emp.checkOut || "—"}</td>
          <td class="duration">${duration || "—"}</td>
          <td>
            <div class="btn-group">
              <button class="btn-in"  onclick="checkIn(${i})"  ${inDisabled}>Kommen</button>
              <button class="btn-out" onclick="checkOut(${i})" ${outDisabled}>Gehen</button>
            </div>
          </td>
        </tr>`;
    });

    document.getElementById("sumPresent").textContent = present;
    document.getElementById("sumDone").textContent = done;
    document.getElementById("sumAbsent").textContent = absent;
    const th = Math.floor(totalMins / 60);
    const tm = String(totalMins % 60).padStart(2, "0");
    document.getElementById("sumTotal").textContent = th + ":" + tm;
  }

  function checkIn(i) {
    const date = picker.value;
    const data = loadData(date);
    data[i].checkIn = nowTime();
    saveData(date, data);
    render();
  }

  function checkOut(i) {
    const date = picker.value;
    const data = loadData(date);
    data[i].checkOut = nowTime();
    saveData(date, data);
    render();
  }

  function exportCSV() {
    const date = picker.value;
    const data = loadData(date);
    let csv = "Name;Datum;Kommen;Gehen;Arbeitszeit\n";
    data.forEach(emp => {
      const dur = calcDuration(emp.checkIn, emp.checkOut) || "";
      csv += `${emp.name};${date};${emp.checkIn || ""};${emp.checkOut || ""};${dur}\n`;
    });
    const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `zeiterfassung_${date}.csv`;
    a.click();
  }

  picker.addEventListener("change", render);
  render();
</script>
</body>
</html>
