<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeiterfassung</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    header p {
      color: #666;
      margin-top: 4px;
      font-size: 0.95rem;
    }

    .date-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .date-bar label {
      font-weight: 600;
      color: #444;
    }

    .date-bar input[type="date"] {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      cursor: pointer;
    }

    table {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    thead tr {
      background: #1a1a2e;
      color: #fff;
    }

    thead th {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f9ff; }

    td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    .name {
      font-weight: 600;
      font-size: 0.95rem;
      color: #1a1a2e;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-in  { background: #22c55e; color: #fff; }
    .btn-out { background: #ef4444; color: #fff; }
    .btn-in:hover:not(:disabled)  { opacity: 0.85; }
    .btn-out:hover:not(:disabled) { opacity: 0.85; }

    .time-cell {
      font-size: 0.9rem;
      color: #555;
      min-width: 90px;
    }

    .duration {
      font-weight: 700;
      color: #1a1a2e;
      min-width: 70px;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .status-present { background: #dcfce7; color: #16a34a; }
    .status-absent  { background: #f1f5f9; color: #94a3b8; }
    .status-done    { background: #e0f2fe; color: #0284c7; }

    .summary {
      max-width: 900px;
      margin: 20px auto 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .summary-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      min-width: 160px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }

    .summary-card .val {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .summary-card .lbl {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }

    .export-bar {
      max-width: 900px;
      margin: 16px auto 0;
      text-align: right;
    }

    .btn-export {
      background: #1a1a2e;
      color: #fff;
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
    }

    .btn-export:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>Zeiterfassung</h1>
  <p>Ingenieurbüro Mirko Molt</p>
</header>

<div class="date-bar">
  <label for="datePicker">Datum:</label>
  <input type="date" id="datePicker">
</div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Mitarbeiter</th>
      <th>Status</th>
      <th>Kommen</th>
      <th>Gehen</th>
      <th>Arbeitszeit</th>
      <th>Aktion</th>
    </tr>
  </thead>
  <tbody id="employeeTable"></tbody>
</table>

<div class="summary">
  <div class="summary-card">
    <div class="val" id="sumPresent">0</div>
    <div class="lbl">Anwesend</div>
  </div>
  <div class="summary-card">
    <div class="val" id="sumDone">0</div>
    <div class="lbl">Abgemeldet</div>
  </div>
  <div class="summary-card">
    <div class="val" id="sumAbsent">0</div>
    <div class="lbl">Abwesend</div>
  </div>
  <div class="summary-card">
    <div class="val" id="sumTotal">0:00</div>
    <div class="lbl">Gesamtstunden heute</div>
  </div>
</div>

<div class="export-bar">
  <button class="btn-export" onclick="exportCSV()">Export CSV</button>
</div>

<script>
  const NAMES = [
    "Anna Becker", "Thomas Müller", "Sandra Koch",
    "Jonas Weber", "Maria Schmidt", "Lukas Fischer",
    "Sabine Hartmann", "Michael Braun", "Laura Schneider", "Stefan Richter",
    "Petra Vogel", "Christian Wolf", "Nina Lange", "Markus Zimmermann", "Claudia Neumann"
  ];

  const picker = document.getElementById("datePicker");
  const today = new Date().toISOString().split("T")[0];
  picker.value = today;

  function storageKey(date) { return "zeiterfassung_" + date; }

  function loadData(date) {
    const raw = localStorage.getItem(storageKey(date));
    if (raw) return JSON.parse(raw);
    return NAMES.map(name => ({ name, checkIn: null, checkOut: null }));
  }

  function saveData(date, data) {
    localStorage.setItem(storageKey(date), JSON.stringify(data));
  }

  function nowTime() {
    return new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
  }

  function calcDuration(inTime, outTime) {
    if (!inTime || !outTime) return null;
    const [ih, im] = inTime.split(":").map(Number);
    const [oh, om] = outTime.split(":").map(Number);
    const mins = (oh * 60 + om) - (ih * 60 + im);
    if (mins <= 0) return null;
    return Math.floor(mins / 60) + ":" + String(mins % 60).padStart(2, "0");
  }

  function render() {
    const date = picker.value;
    const data = loadData(date);
    const tbody = document.getElementById("employeeTable");
    tbody.innerHTML = "";

    let present = 0, done = 0, absent = 0, totalMins = 0;

    data.forEach((emp, i) => {
      const duration = calcDuration(emp.checkIn, emp.checkOut);

      let statusLabel, statusClass;
      if (emp.checkIn && !emp.checkOut) {
        statusLabel = "Anwesend"; statusClass = "status-present"; present++;
      } else if (emp.checkIn && emp.checkOut) {
        statusLabel = "Abgemeldet"; statusClass = "status-done"; done++;
        if (duration) {
          const [h, m] = duration.split(":").map(Number);
          totalMins += h * 60 + m;
        }
      } else {
        statusLabel = "Abwesend"; statusClass = "status-absent"; absent++;
      }

      const inDisabled  = emp.checkIn  ? "disabled" : "";
      const outDisabled = (!emp.checkIn || emp.checkOut) ? "disabled" : "";

      tbody.innerHTML += `
        <tr>
          <td style="color:#aaa;font-size:0.85rem">${i + 1}</td>
          <td class="name">${emp.name}</td>
          <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
          <td class="time-cell">${emp.checkIn  || "—"}</td>
          <td class="time-cell">${emp.checkOut || "—"}</td>
          <td class="duration">${duration || "—"}</td>
          <td>
            <div class="btn-group">
              <button class="btn-in"  onclick="checkIn(${i})"  ${inDisabled}>Kommen</button>
              <button class="btn-out" onclick="checkOut(${i})" ${outDisabled}>Gehen</button>
            </div>
          </td>
        </tr>`;
    });

    document.getElementById("sumPresent").textContent = present;
    document.getElementById("sumDone").textContent = done;
    document.getElementById("sumAbsent").textContent = absent;
    const th = Math.floor(totalMins / 60);
    const tm = String(totalMins % 60).padStart(2, "0");
    document.getElementById("sumTotal").textContent = th + ":" + tm;
  }

  function checkIn(i) {
    const date = picker.value;
    const data = loadData(date);
    data[i].checkIn = nowTime();
    saveData(date, data);
    render();
  }

  function checkOut(i) {
    const date = picker.value;
    const data = loadData(date);
    data[i].checkOut = nowTime();
    saveData(date, data);
    render();
  }

  function exportCSV() {
    const date = picker.value;
    const data = loadData(date);
    let csv = "Name;Datum;Kommen;Gehen;Arbeitszeit\n";
    data.forEach(emp => {
      const dur = calcDuration(emp.checkIn, emp.checkOut) || "";
      csv += `${emp.name};${date};${emp.checkIn || ""};${emp.checkOut || ""};${dur}\n`;
    });
    const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `zeiterfassung_${date}.csv`;
    a.click();
  }

  picker.addEventListener("change", render);
  render();
</script>
</body>
</html>
